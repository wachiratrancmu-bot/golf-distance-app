<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B5E20">
  
  <meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> <meta name="apple-mobile-web-app-title" content="GolfApp"> <title>Golf Distance Manager</title>
  <style>
    :root {
      --banner-height: 48px; 
    }
    
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; 
      background-color: #1B5E20; 
    }
    
    .iframe-container {
      position: absolute;
      /* ปรับให้ขยับขึ้นไปซ่อน Banner เหมือนเดิม */
      top: calc(-1 * var(--banner-height)); 
      left: 0;
      width: 100%;
      height: calc(100% + var(--banner-height)); 
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block; 
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbyvniLMCb9OcX6Bclriw5uPXRcXCwYJeskxBfHxPh_ZT3ExO2ln-6i2WOW7ILI8kAwK/exec"></iframe>
  </div>
</body>
</html>
