<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B5E20">
  <title>Golf Distance Manager</title>
  <style>
    :root {
      /* 🛠️ ปรับตัวเลขตรงนี้แค่จุดเดียวครับ! */
      /* - ถ้าเปิดแล้วไม่มีแถบ Google เลย ให้ใส่ 0px */
      /* - ถ้าเห็นแถบ Google 1 บรรทัด ให้ใส่ 28px */
      /* - ถ้าเห็นแถบ Google 2 บรรทัด ให้ใส่ 46px */
      --banner-height: 0px; 
    }
    
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100dvh; 
      overflow: hidden; 
      background-color: #1B5E20; 
    }
    
    .iframe-container {
      position: absolute;
      top: calc(-1 * var(--banner-height)); 
      left: 0;
      width: 100%;
      height: calc(100dvh + var(--banner-height)); 
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbyvniLMCb9OcX6Bclriw5uPXRcXCwYJeskxBfHxPh_ZT3ExO2ln-6i2WOW7ILI8kAwK/exec"></iframe>
  </div>
</body>
</html>
