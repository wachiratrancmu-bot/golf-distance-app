<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B5E20">
  <title>Golf Distance Manager</title>
  <style>
    /* ตั้งค่าให้เต็มจอและซ่อน Scrollbar ของหน้าเว็บหลัก */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
      background-color: #1B5E20; 
    }
    .iframe-container {
      position: absolute;
      top: -30px; /* ขยับหน้าจอขึ้น 30px เพื่อดันแถบแจ้งเตือน Google ให้หลุดขอบจอไป */
      left: 0;
      width: 100%;
      height: calc(100% + 30px);
    }
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbzUms_B5JqhMCAqI7dIIQ8WFA2MWv0-PyrweWE3vC1IzUJnCt3tePcQDV8SENWo7o2E/exec"></iframe>
  </div>
</body>
</html>
